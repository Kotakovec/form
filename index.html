<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kotak Table Viewer</title>
    <style>
        /* Základní reset a temný styl */
        body { 
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace; 
            background: #0a0a0a; 
            color: white; 
            margin: 0; 
            padding: 0;
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; /* Zajistí vycentrování na střed výšky obrazovky */
            overflow-x: hidden;
        }

        /* Načítací obrazovka přes celou plochu */
        #loader-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #0a0a0a; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 1000; 
        }
        #loader-logo { max-width: 150px; height: auto; margin-bottom: 30px; }
        #loader-text { font-size: 1.2rem; color: #00c853; margin-bottom: 15px; text-shadow: 0 0 5px #00c853; }
        .progress-container { width: 300px; height: 10px; background: #222; border-radius: 5px; overflow: hidden; border: 1px solid #333; }
        #progress-bar { height: 100%; width: 0%; background: #00c853; box-shadow: 0 0 10px #00c853; transition: width 0.1s ease-out; }

        /* Hlavní kontejner - vše vycentrované pod sebou */
        .container { 
            width: 90%; 
            max-width: 900px; 
            display: none; 
            flex-direction: column; 
            align-items: center; /* Vycentrování obsahu horizontálně */
            text-align: center;  /* Vycentrování textu */
            padding: 40px 0;
        }
        
        /* Sekce s textem */
        #text-section { margin-bottom: 40px; width: 100%; }
        h1 { color: #00c853; margin-bottom: 15px; font-size: 2rem; display: inline-block; border-bottom: 2px solid #00c853; padding-bottom: 5px; }
        #table-desc { color: #ccc; max-width: 600px; margin: 0 auto; line-height: 1.6; }
        
        /* Sekce s tabulkou */
        #table-section { width: 100%; overflow-x: auto; /* Scrollbar pro malé mobily */ }
        table { width: 100%; border-collapse: collapse; background: #141414; box-shadow: 0 0 25px rgba(0,200,83,0.1); }
        th, td { border: 1px solid #333; padding: 15px; text-align: center; }
        th { background: #00c853; color: black; text-transform: uppercase; letter-spacing: 1px; }
        tr:nth-child(even) { background: #1a1a1a; }
        tr:hover { background: #222; }
    </style>
</head>
<body>

    <div id="loader-overlay">
        <img src="./logo.png" alt="Logo" id="loader-logo">
        <div id="loader-text">KotakEngine - Načítání z databáze [0]%</div>
        <div class="progress-container"><div id="progress-bar"></div></div>
    </div>

    <div class="container" id="main-content">
        <div id="text-section">
            <h1 id="table-title"></h1>
            <p id="table-desc"></p>
        </div>

        <div id="table-section">
            <table id="data-table">
                <thead><tr id="table-head"></tr></thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        function simulateLoading() {
            return new Promise((resolve) => {
                const progressBar = document.getElementById('progress-bar');
                const loaderText = document.getElementById('loader-text');
                let progress = 0;
                const interval = setInterval(() => {
                    progress += Math.floor(Math.random() * 20) + 10;
                    if (progress > 100) progress = 100;
                    progressBar.style.width = progress + '%';
                    loaderText.innerText = `KotakEngine - Načítání z databáze [${progress}]%`;
                    if (progress === 100) { clearInterval(interval); setTimeout(resolve, 200); }
                }, 150);
            });
        }

        async function loadData() {
            try {
                const [response] = await Promise.all([
                    fetch('data.json?t=' + Date.now()),
                    simulateLoading()
                ]);

                const data = await response.json();

                // Logika pro Text
                if (data.settings.showText) {
                    document.getElementById('table-title').innerText = data.content.title;
                    document.getElementById('table-desc').innerText = data.content.description;
                } else {
                    document.getElementById('text-section').style.display = 'none';
                }

                // Logika pro Tabulku
                if (data.settings.showTable) {
                    const headRow = document.getElementById('table-head');
                    data.table.columns.forEach(col => {
                        const th = document.createElement('th');
                        th.innerText = col;
                        headRow.appendChild(th);
                    });
                    const body = document.getElementById('table-body');
                    data.table.rows.forEach(row => {
                        const tr = document.createElement('tr');
                        row.forEach(cell => {
                            const td = document.createElement('td');
                            td.innerText = cell;
                            tr.appendChild(td);
                        });
                        body.appendChild(tr);
                    });
                } else {
                    document.getElementById('table-section').style.display = 'none';
                }

                // Zobrazení všeho najednou
                document.getElementById('loader-overlay').style.display = 'none';
                document.getElementById('main-content').style.display = 'flex'; // Používáme flex pro centrování

            } catch (err) {
                document.getElementById('loader-text').innerText = "CHYBA NAČÍTÁNÍ DAT";
                document.getElementById('loader-text').style.color = "red";
            }
        }

        window.onload = loadData;
    </script>
</body>
</html>
