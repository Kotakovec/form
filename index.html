<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kotak Table Viewer</title>
    <style>
        /* Celkové nastavení stránky - bez scrollu */
        body { 
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace; 
            background: #0a0a0a; 
            color: white; 
            margin: 0; 
            padding: 0;
            height: 100vh; 
            width: 100vw;
            overflow: hidden; 
            display: flex;
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
        }

        /* Načítací obrazovka (Overlay) */
        #loader-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0a0a0a; display: flex; flex-direction: column;
            align-items: center; z-index: 1000; padding: 40px 0; box-sizing: border-box;
        }

        #loader-logo { 
            max-width: 180px; height: auto; 
            margin-top: auto; margin-bottom: auto; 
        }

        #loader-text { 
            font-size: 1.1rem; color: #00c853; margin-bottom: 15px; 
            text-shadow: 0 0 5px #00c853; text-align: center;
        }

        .progress-container { 
            width: 280px; height: 8px; background: #1a1a1a; 
            border-radius: 10px; overflow: hidden; border: 1px solid #333; margin-bottom: 20px;
        }

        #progress-bar { 
            height: 100%; width: 0%; background: #00c853; 
            box-shadow: 0 0 10px #00c853; transition: width 0.15s ease-out; 
        }

        /* Hlavní kontejner s obsahem */
        .container { 
            width: 90%; max-width: 900px; display: none; 
            flex-direction: column; align-items: center; text-align: center;
        }

        #text-section { margin-bottom: 30px; }
        h1 { color: #00c853; border-bottom: 2px solid #00c853; padding-bottom: 5px; display: inline-block; }
        #table-desc { color: #888; margin-top: 10px; }

        #table-section { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: #111; }
        th, td { border: 1px solid #333; padding: 12px; text-align: center; }
        th { background: #00c853; color: black; }
        tr:nth-child(even) { background: #161616; }

        /* --- Styly pro ANO / NE --- */
        .status-ano { 
            color: #00ff00; /* Jasně zelená */
            font-weight: bold;
            text-shadow: 0 0 8px rgba(0, 255, 0, 0.4);
        }
        .status-ne { 
            color: #ff4444; /* Jasně červená */
            font-weight: bold;
            text-shadow: 0 0 8px rgba(255, 68, 68, 0.4);
        }
    </style>
</head>
<body>

    <div id="loader-overlay">
        <img src="logo.png" alt="KotakEngine Logo" id="loader-logo">
        <div id="loader-text">KotakEngine - Načítání z databáze [0]%</div>
        <div class="progress-container"><div id="progress-bar"></div></div>
    </div>

    <div class="container" id="main-content">
        <div id="text-section">
            <h1 id="table-title"></h1>
            <p id="table-desc"></p>
        </div>

        <div id="table-section">
            <table id="data-table">
                <thead><tr id="table-head"></tr></thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        function simulateLoading() {
            return new Promise((resolve) => {
                const progressBar = document.getElementById('progress-bar');
                const loaderText = document.getElementById('loader-text');
                let progress = 0;
                const interval = setInterval(() => {
                    progress += Math.floor(Math.random() * 15) + 10;
                    if (progress > 100) progress = 100;
                    progressBar.style.width = progress + '%';
                    loaderText.innerText = `KotakEngine - Načítání z databáze [${progress}]%`;
                    if (progress === 100) { clearInterval(interval); setTimeout(resolve, 300); }
                }, 120);
            });
        }

        async function init() {
            try {
                const [response] = await Promise.all([
                    fetch('data.json?t=' + Date.now()),
                    simulateLoading()
                ]);

                if (!response.ok) throw new Error();
                const data = await response.json();

                if (data.settings.showText) {
                    document.getElementById('table-title').innerText = data.content.title;
                    document.getElementById('table-desc').innerText = data.content.description;
                } else {
                    document.getElementById('text-section').style.display = 'none';
                }

                if (data.settings.showTable) {
                    const head = document.getElementById('table-head');
                    data.table.columns.forEach(c => {
                        const th = document.createElement('th');
                        th.innerText = c;
                        head.appendChild(th);
                    });

                    const body = document.getElementById('table-body');
                    data.table.rows.forEach(r => {
                        const tr = document.createElement('tr');
                        r.forEach(cellText => {
                            const td = document.createElement('td');
                            td.innerText = cellText;

                            // LOGIKA PRO BARVY (ANO / NE)
                            const cleanText = cellText.toString().trim().toUpperCase();
                            if (cleanText === "ANO") {
                                td.classList.add('status-ano');
                            } else if (cleanText === "NE") {
                                td.classList.add('status-ne');
                            }

                            tr.appendChild(td);
                        });
                        body.appendChild(tr);
                    });
                } else {
                    document.getElementById('table-section').style.display = 'none';
                }

                document.getElementById('loader-overlay').style.display = 'none';
                document.getElementById('main-content').style.display = 'flex';

            } catch (e) {
                document.getElementById('loader-text').innerText = "KRITICKÁ CHYBA DATABÁZE";
                document.getElementById('loader-text').style.color = "#ff4444";
            }
        }

        window.onload = init;
    </script>
</body>
</html>
