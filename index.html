<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kotak Table Viewer</title>
    <style>
        body { 
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace; 
            background: #0a0a0a; 
            color: white; 
            margin: 0; 
            padding: 0;
            height: 100vh; 
            width: 100vw;
            overflow: hidden; 
            display: flex;
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
        }

        #loader-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0a0a0a; display: flex; flex-direction: column;
            align-items: center; z-index: 1000; padding: 40px 0; box-sizing: border-box;
        }

        #loader-logo { 
            max-width: 150px; height: auto; 
            margin-top: auto; margin-bottom: auto; 
        }

        #loader-text { 
            font-size: 1.1rem; color: #00c853; margin-bottom: 15px; 
            text-shadow: 0 0 5px #00c853; text-align: center;
        }

        .progress-container { 
            width: 250px; height: 6px; background: #1a1a1a; 
            border-radius: 10px; overflow: hidden; border: 1px solid #333; margin-bottom: 20px;
        }

        #progress-bar { 
            height: 100%; width: 0%; background: #00c853; 
            box-shadow: 0 0 10px #00c853; transition: width 0.15s ease-out; 
        }

        .container { 
            width: 95%; 
            max-width: 500px; 
            display: none; 
            flex-direction: column; 
            align-items: center; 
            text-align: center;
            padding: 10px 0;
        }

        #text-section { margin-bottom: 10px; width: 100%; }
        
        /* Odstraněna čára (border-bottom) a upraven styl nadpisu */
        h1 { 
            color: #00c853; 
            display: inline-block; 
            font-size: 1.4rem; 
            margin: 10px 0; 
            border: none; /* Explicitně zrušena čára */
        }
        
        #table-desc { color: #888; margin-top: 5px; font-size: 0.85rem; }

        #table-section { 
            width: 100%; 
            max-height: 75vh; 
            overflow-y: auto; 
            border: 1px solid #333;
            border-radius: 4px;
        }
        
        table { width: 100%; border-collapse: collapse; background: #111; }
        
        th, td { 
            border: 1px solid #222; 
            padding: 6px 8px; 
            text-align: center; 
            font-size: 0.85rem; 
        }

        th { 
            background: #00c853; 
            color: black; 
            font-size: 0.8rem; 
            position: sticky; top: 0; 
            z-index: 10;
        }

        tr:nth-child(even) { background: #161616; }
        
        .status-ano { color: #00ff00; font-weight: bold; }
        .status-ne { color: #ff4444; font-weight: bold; }
    </style>
</head>
<body>

    <div id="loader-overlay">
        <img src="logo.png" alt="Logo" id="loader-logo">
        <div id="loader-text">KotakEngine - Načítání [0]%</div>
        <div class="progress-container"><div id="progress-bar"></div></div>
    </div>

    <div class="container" id="main-content">
        <div id="text-section" style="display: none;"> <h1 id="table-title"></h1>
            <p id="table-desc"></p>
        </div>

        <div id="table-section" style="display: none;"> <table id="data-table">
                <thead><tr id="table-head"></tr></thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        function simulateLoading() {
            return new Promise((resolve) => {
                const progressBar = document.getElementById('progress-bar');
                const loaderText = document.getElementById('loader-text');
                let progress = 0;
                const interval = setInterval(() => {
                    progress += Math.floor(Math.random() * 20) + 10;
                    if (progress > 100) progress = 100;
                    progressBar.style.width = progress + '%';
                    loaderText.innerText = `KotakEngine - Načítání [${progress}]%`;
                    if (progress === 100) { clearInterval(interval); setTimeout(resolve, 200); }
                }, 100);
            });
        }

        async function init() {
            try {
                const [response] = await Promise.all([
                    fetch('data.json?t=' + Date.now()),
                    simulateLoading()
                ]);

                if (!response.ok) throw new Error();
                const data = await response.json();

                // Kontrola textu - pokud je zapnutý a není prázdný
                if (data.settings.showText && data.content.title.trim() !== "") {
                    document.getElementById('text-section').style.display = 'block';
                    document.getElementById('table-title').innerText = data.content.title;
                    document.getElementById('table-desc').innerText = data.content.description;
                }

                // Kontrola tabulky
                if (data.settings.showTable) {
                    document.getElementById('table-section').style.display = 'block';
                    const head = document.getElementById('table-head');
                    data.table.columns.forEach(c => {
                        const th = document.createElement('th');
                        th.innerText = c;
                        head.appendChild(th);
                    });

                    const body = document.getElementById('table-body');
                    data.table.rows.forEach(r => {
                        const tr = document.createElement('tr');
                        r.forEach(cellText => {
                            const td = document.createElement('td');
                            td.innerText = cellText;
                            const cleanText = cellText.toString().trim().toUpperCase();
                            if (cleanText === "ANO") td.classList.add('status-ano');
                            else if (cleanText === "NE") td.classList.add('status-ne');
                            tr.appendChild(td);
                        });
                        body.appendChild(tr);
                    });
                }

                document.getElementById('loader-overlay').style.display = 'none';
                document.getElementById('main-content').style.display = 'flex';

            } catch (e) {
                document.getElementById('loader-text').innerText = "CHYBA DATA.JSON";
                document.getElementById('loader-text').style.color = "#ff4444";
            }
        }
        window.onload = init;
    </script>
</body>
</html>
